firewall:
  rules:
    - "disable"
    - "allow ssh/tcp"
    - "limit ssh/tcp"
    - "allow 19683/tcp"
    - "logging on"
    - "enable"

services:
  - name: docker
    action: "start --now"
  - name: ngrok
    action: "start"
  - name: bluetooth
    action: "start"
    enable: true

docker:
  containers:
    portainer:
      image: "portainer/portainer-ce:2.9.3"
      ports:
        - "8000:8000"
        - "9443:9443"
      volumes:
        - "/var/run/docker.sock:/var/run/docker.sock"
        - "portainer_data:/data"
      restart: always
    
    portainer_agent:
      image: "portainer/agent:2.9.3"
      ports:
        - "9001:9001"
      volumes:
        - "/var/run/docker.sock:/var/run/docker.sock"
        - "/var/lib/docker/volumes:/var/lib/docker/volumes"
      restart: always
