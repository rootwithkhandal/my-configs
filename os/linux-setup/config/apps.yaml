custom_installers:
  zed:
    enabled: true
    url: "https://zed.dev/install.sh"
  
  wezterm:
    enabled: true
    type: "apt_repo"
    key_url: "https://apt.fury.io/wez/gpg.key"
    repo: "deb [signed-by=/etc/apt/keyrings/wezterm.gpg] https://apt.fury.io/wez/ * *"
    package: "wezterm"
  
  brave:
    enabled: true
    url: "https://dl.brave.com/install.sh"
  
  spotify:
    enabled: false  # Using flatpak version
  
  sublime:
    enabled: false
    type: "apt_repo"
    key_url: "https://download.sublimetext.com/sublimehq-pub.gpg"
    repo: "deb [signed-by=/etc/apt/keyrings/sublime.gpg] https://download.sublimetext.com/ apt/stable/"
    package: "sublime-text"
  
  ngrok:
    enabled: true
    type: "apt_repo"
    key_url: "https://ngrok-agent.s3.amazonaws.com/ngrok.asc"
    repo: "deb [signed-by=/etc/apt/keyrings/ngrok.gpg] https://ngrok-agent.s3.amazonaws.com buster main"
    package: "ngrok"
  
  bbht:
    enabled: true
    type: "manual"
    notes: "Bug bounty hunting tools - install manually as needed"
